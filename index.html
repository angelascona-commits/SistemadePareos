<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Clínicas con Google Sheets</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
    
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <h2>Sistema de Comparación Clinicas</h2>

    <div class="form-group">
        <label for="urlGoogleSheet">1. URL de tu Base de Datos (Google Sheets):</label>
        <input type="text" id="urlGoogleSheet" placeholder="Pega aquí el enlace de tu Google Sheet..." value="">
        
    </div>

    <div class="form-group">
        <label for="archivoNuevo">2. Nuevo Reporte a comparar (Excel):</label>
        <input type="file" id="archivoNuevo" accept=".xlsx, .xls, .csv">
    </div>

    <button id="btnProcesar">Comparar y Descargar Resultados</button>
    
    <div id="mensaje"></div>

</div>

</body>
</html>
